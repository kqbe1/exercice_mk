<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="../styles/main.css" />

</head>
<body>

  <header class="navbar">
    <div class="navbar__inner">
    <a href="../index.html" class="navbar__logo">
      <svg width="181" height="221" viewBox="0 0 181 221" fill="none" xmlns="http://www.w3.org/2000/svg">
<path d="M107.565 143.907C116.051 143.907 122.931 150.81 122.931 159.326C122.931 167.841 116.051 174.744 107.565 174.744C99.078 174.744 92.1982 167.841 92.1982 159.326C92.1982 150.81 99.078 143.907 107.565 143.907Z" fill="#46029E"/>
<path fill-rule="evenodd" clip-rule="evenodd" d="M58.6143 33.2413L89.6371 3.12187L120.655 33.2413L174.387 0.245935L168.36 102.404L151.103 107.89L147.396 116.091C162.339 126.917 174.106 141.881 181 159.326C166.723 195.452 131.588 221 90.5025 221C49.4159 221 14.2762 195.453 0 159.326C6.76825 142.198 18.231 127.455 32.7886 116.678L31.1829 107.89L11.4447 102.891L4.48186 0L58.6143 33.2413ZM90.5025 128.488C66.9642 128.488 46.2311 140.753 34.3792 159.326C46.2311 177.898 66.9642 190.163 90.5025 190.163C114.037 190.163 134.764 177.898 146.616 159.326C134.764 140.754 114.037 128.488 90.5025 128.488ZM61.8456 62.5728L30.7327 43.4702L33.5039 84.4159L53.7823 89.5554L33.5039 97.2647H145.365L148.542 43.4702L117.429 62.5728L89.6371 35.5903L61.8456 62.5728Z" fill="#46029E"/>
</svg>
      Movie Kings
    </a>
    <nav class="navbar__nav" id="mainNav">
      <a href="../index.html" class="navbar__link">Home</a>
      <a href="quiz.html" class="navbar__link">Quiz</a>
      <a href="results.html" class="navbar__link active">Results</a>
      <div class="navbar__lang">
        <button class="active" onclick="setLang('en')">EN</button>
        <button onclick="setLang('fr')">FR</button>
      </div>
    </nav>
    <button class="navbar__hamburger" id="hamburger" aria-label="Menu">&#9776;</button>
    </div>
  </header>

  <main class="results-page">
    <div class="results-card">
      <h1 class="results-card__title">Your Results</h1>
      <p id="playerGreet" class="results-card__greet"></p>
      <div class="results-card__score" id="scoreDisplay">— / —</div>
      <p class="results-card__feedback" id="feedbackText">Loading...</p>
      <div class="results-card__actions">
        <a href="quiz.html" class="btn btn--primary">Play Again</a>
        <a href="../index.html" class="btn btn--dark">Home</a>
      </div>
    </div>
  </main>

  <script>
    const score = parseInt(sessionStorage.getItem('quizScore') || 0);
    const total = parseInt(sessionStorage.getItem('quizTotal') || 10);
    const name = sessionStorage.getItem('playerName') || 'Player';

    document.getElementById('playerGreet').textContent = `Well done, ${name}!`;
    document.getElementById('scoreDisplay').textContent = `${score} / ${total}`;

    let feedback = '';
    const pct = score / total;
    if (pct === 1) feedback = '🏆 Perfect score! You are a true Movie King!';
    else if (pct >= 0.8) feedback = '⭐ Excellent! You really know your movies.';
    else if (pct >= 0.6) feedback = '👍 Good job! You\'re a solid movie fan.';
    else if (pct >= 0.4) feedback = '🎬 Not bad, keep watching more films!';
    else feedback = '🍿 Time to rewatch some classics!';

    document.getElementById('feedbackText').textContent = feedback;
  </script>
  <script src="../scripts/main.js"></script>
  <script src="../scripts/quiz.js"></script>
</body>
</html>
