<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Kings — Quiz</title>
  <link rel="stylesheet" href="../styles/main.css" />
</head>
<body>

  <!-- ===== NAVBAR (quiz mode) ===== -->
  <header class="navbar">
    <a href="../index.html" class="navbar__logo">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 17L4 8L8 13L12 5L16 13L20 8L22 17H2Z" fill="#f5a623" stroke="#f5a623" stroke-linejoin="round"/>
        <rect x="2" y="17" width="20" height="2" fill="#f5a623"/>
      </svg>
      Movie Kings
    </a>
    <button class="btn--stop" onclick="confirmStop()">Stop Quiz</button>
  </header>

  <!-- ===== QUIZ PAGE ===== -->
  <main class="quiz-page">

    <!-- Progress bar -->
    <div class="quiz-progress">
      <div class="quiz-progress__label">
        <span id="questionLabel">Question 1 of 10</span>
        <span id="progressPercent">10%</span>
      </div>
      <div class="quiz-progress__bar">
        <div class="quiz-progress__fill" id="progressFill" style="width: 10%;"></div>
      </div>
    </div>

    <!-- Question card -->
    <div class="quiz-card">
      <p class="quiz-card__quote" id="quoteText">"Here's looking at you, kid."</p>
      <div class="quiz-card__options" id="optionsContainer">
        <!-- Options generated by JS -->
      </div>
      <div class="quiz-card__footer">
        <button class="btn btn--primary" id="submitBtn" disabled>Submit Answer</button>
      </div>
    </div>

  </main>

  <script src="../scripts/quiz.js"></script>
</body>
</html>
